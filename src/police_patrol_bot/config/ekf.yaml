### robot_localization EKF — fuses wheel odometry (/odom) with the IMU
### (/imu/data_raw), both published by the RP2040 firmware over micro-ROS.
###
### Output: filtered odom -> base_footprint TF and /odometry/filtered.
### The URDF's fixed base_footprint -> base_link transform is published by
### robot_state_publisher, so base_link is NOT double-parented.
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true          # planar robot — zeroes z, roll, pitch
    publish_tf: true

    map_frame: map            # declared but unused (no map source)
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # ── Wheel odometry — fuse body velocities (not absolute pose, to avoid
    #    double-counting the Pico's own integration) ─────────────────────────
    odom0: /odom
    #             x      y      z
    #             roll   pitch  yaw
    #             vx     vy     vz
    #             vroll  vpitch vyaw
    #             ax     ay     az
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # ── IMU — MPU9250 raw accel + gyro (orientation not provided) ───────────
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
